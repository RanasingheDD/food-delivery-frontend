# The name of your pipeline visible in GitHub's UI
name: CI/CD Pipeline

# 1. Define the Triggers (When should this run?)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. Define the Stages (What should it do?)
jobs:
  # Continuous Integration Job
  build:
    runs-on: [self-hosted]

    steps:
      # Step 1: Clone your repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the programming language environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Install application dependencies
      - name: Install Dependencies
        run: |
            npm ci
            npm update
  scan:
    needs: build
    runs-on: [self-hosted]

    steps: 

      - name: Static Code Analysis
        uses: sonarsource/sonarqube-scan-action@master
        env: 
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "food-delivery"
          path: "."
          format: "HTML"
          out: "reports"

  build-push:
    needs: scan
    runs-on: [self-hosted]

    steps:
      - name: Build Docker image
        run: docker build -t dishr/fronend:latest .

      - name: Trivy image scan
        run: trivy image --exit-code 0 --severity CRITICAL dishr/fronend:latest

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: docker push dishr/fronend:latest
  



